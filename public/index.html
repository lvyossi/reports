<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מרכז הדוחות · סוכנות דיגיטל</title>
<meta name="description" content="מרכז הדוחות הדיגיטליים — סיכומי ביצועים חודשיים ללקוחות הסוכנות." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{--blue:#2e7ce0;--blue-2:#4aa6ec;--cherry:#e63950;--cherry-2:#ff5d72;
  --bg:#070c16;--bg-2:#0b1322;--card:rgba(255,255,255,.045);--card-bd:rgba(255,255,255,.09);
  --txt:#eaf1fb;--muted:#90a2bd}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',system-ui,sans-serif;background:var(--bg);color:var(--txt);
  min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-2;
  background:radial-gradient(900px 600px at 80% -5%,rgba(46,124,224,.22),transparent 60%),
  radial-gradient(700px 520px at 5% 8%,rgba(230,57,80,.14),transparent 55%),
  linear-gradient(180deg,var(--bg),var(--bg-2))}
.wrap{max-width:980px;margin:0 auto;padding:0 24px;width:100%}
main{flex:1;display:flex;align-items:center;padding:80px 0}
.kicker{display:inline-flex;gap:9px;align-items:center;font-weight:600;font-size:14px;color:var(--blue-2);
  border:1px solid rgba(46,124,224,.35);background:rgba(46,124,224,.08);padding:8px 18px;border-radius:100px;margin-bottom:26px;
  animation:rise .9s both}
.dot{width:8px;height:8px;border-radius:50%;background:#36d399}
h1{font-size:clamp(38px,6.4vw,72px);font-weight:900;letter-spacing:-1.8px;line-height:1.04;
  background:linear-gradient(120deg,#fff 28%,var(--blue-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:rise .9s .08s both}
.sub{color:var(--muted);font-size:clamp(16px,2vw,20px);margin-top:22px;max-width:560px;animation:rise .9s .16s both}
.clients{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:46px}
a.client{display:flex;align-items:center;gap:18px;text-decoration:none;color:inherit;background:var(--card);
  border:1px solid var(--card-bd);border-radius:20px;padding:24px 26px;transition:.28s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 24px 60px -34px rgba(0,0,0,.7)}
a.client:hover{transform:translateY(-5px);border-color:rgba(46,124,224,.5)}
a.client .mark{width:52px;height:52px;border-radius:14px;flex:none;display:grid;place-items:center;font-weight:900;font-size:22px;
  background:linear-gradient(150deg,var(--blue),#0d2a4d);color:#fff}
a.client .t b{font-size:19px;font-weight:800;display:block}
a.client .t span{color:var(--muted);font-size:13.5px}
a.client .arrow{margin-inline-start:auto;color:var(--blue-2);font-weight:800}
footer{text-align:center;padding:30px 0;color:#54657f;font-size:13px;border-top:1px solid var(--card-bd)}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<main>
  <div class="wrap">
    <div class="kicker"><span class="dot"></span> מרכז הדוחות</div>
    <h1>דוחות ביצועים<br>חודשיים ללקוחות</h1>
    <p class="sub">סיכומי מדיה, אורגני, תובנות והמלצות — מעוצבים, ברורים ומעודכנים מדי חודש.</p>
    <div class="clients">
      <a class="client" href="duvdevan/">
        <span class="mark">D</span>
        <span class="t"><b>דובדבן ביצוע</b><span>עבודות גמר · בנייה</span></span>
        <span class="arrow">←</span>
      </a>
      <a class="client" href="hair-cosmetics/">
        <span class="mark" style="background:linear-gradient(150deg,#e6398f,#d99b3c)">ה</span>
        <span class="t"><b>הייר קוסמטיקס</b><span>קוסמטיקה לשיער · Meta + Google</span></span>
        <span class="arrow">←</span>
      </a>
    </div>
  </div>
</main>
<footer>© 2026 · מרכז הדוחות הדיגיטליים</footer>
</body>
</html>
